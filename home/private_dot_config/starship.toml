Debian = "’īå"
EndeavourOS = "’äĄ"
Fedora = "’īŖ"
Linux = "Ņ£Æ"
Macos = "Ņ£æ"
NixOS = "’īō"
Pop = "’ī¬"
RedHatEnterprise = "Ņ×╗"
Redhat = "Ņ×╗"
SUSE = "’īö"
Ubuntu = "’īø"
Windows = "Ņ£Å"

[username]
show_always = true
style_user = "bg:green fg:crust"
style_root = "bg:green fg:red"
format = '[$user]($style)'

[hostname]
ssh_only = false
ssh_symbol = '@'
style = "bg:green fg:crust"
trim_at = '.'
disabled = false
format = '[@$hostname ]($style)'

[env_var.ZMX_SESSION]
symbol = "Ņ»ł "
format = "[$symbol$env_value ]($style)"
description = "zmx session name"
style = "bg:green fg:crust"

[shell]
disabled = false
style = "fg:crust bg:yellow"
fish_indicator = '­¤É¤'
zsh_indicator = '’äĀ'
format = "[$indicator ]($style)"

[directory]
style = "fg:crust bg:yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:pink"
format = '[[ $symbol $branch ](fg:crust bg:pink)]($style)'

[git_status]
style = "bg:pink"
format = '[[($all_status$ahead_behind )](fg:crust bg:pink)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[c]
symbol = "Ņś× "
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[custom.nixlang]
command = "nix --version | awk '{ print $NF }'"
detect_extensions = ['nix']
format = '[ $symbol $output ]($style)'
style = "fg:crust bg:blue"
symbol = '¾▒äģ'

[pixi]
style = "fg:crust bg:blue"
format = '[ $symbol$environment ]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[ruby]
symbol = "Ņśģ"
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:blue"
format = '[[ $symbol( $version) ](fg:crust bg:blue)]($style)'

[python]
symbol = "Ņśå"
style = "bg:blue"
