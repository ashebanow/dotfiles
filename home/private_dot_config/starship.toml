neutral_aqua = "#689d6a"
# Neutral/faded accents
neutral_red = "#cc241d"
maroon = "#cc241d"           # alias: neutral_red
neutral_yellow = "#d79921"
neutral_orange = "#d65d0e"

[os]
disabled = false
style = "bg:green fg:crust"
format = '[$symbol ]($style)'

[os.symbols]
Alpine = "’īĆ"
Android = "Ņ£Ä"
Arch = "’īā"
