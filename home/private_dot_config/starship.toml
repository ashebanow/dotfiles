green = "#a3be51"            # midpoint: gruvbox aqua Ōåö green
neutral_green = "#98971a"
yellow_bright = "#fabd2f"
orange = "#fe8019"
flamingo = "#fe8019"         # alias: orange
peach = "#fe8019"            # alias: orange
blue = "#83a598"
sky = "#83a598"              # alias: blue
neutral_blue = "#458588"
sapphire = "#458588"         # alias: neutral_blue
purple = "#d3869b"
pink = "#83a598"             # alias: blue (muted light blue)
lavender = "#83a598"         # alias: blue
neutral_purple = "#b16286"
mauve = "#b16286"            # alias: neutral_purple
aqua = "#8ec07c"
